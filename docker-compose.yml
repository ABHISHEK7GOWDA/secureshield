version: "3.8"

services:
  mongodb:
    image: mongo:6.0
    container_name: secureshield-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - secureshield-network

  redis:
    image: redis:7.0-alpine
    container_name: secureshield-cache
    ports:
      - "6379:6379"
    networks:
      - secureshield-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secureshield-api
    ports:
      - "4173:4173"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/secureshield
      - REDIS_URI=redis://redis:6379
      - PORT=4173
      - ACCESS_TOKEN_SECRET=secureshield_prod_access_secret_99455
      - REFRESH_TOKEN_SECRET=secureshield_prod_refresh_secret_99455
      - NODE_ENV=production
    depends_on:
      - mongodb
      - redis
    networks:
      - secureshield-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: secureshield-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - secureshield-network

  prometheus:
    image: prom/prometheus:latest
    container_name: secureshield-metrics
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - secureshield-network

volumes:
  mongo-data:

networks:
  secureshield-network:
    driver: bridge
